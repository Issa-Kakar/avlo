<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="status">Connecting...</div>
    <div id="messages"></div>
    
    <script>
        const roomId = 'test-room-' + Date.now();
        
        // Test direct connection to backend
        console.log('Testing direct connection to backend...');
        const wsBackend = new WebSocket(`ws://localhost:3001/ws/${roomId}`);
        
        wsBackend.onopen = () => {
            document.getElementById('status').innerHTML += '<br>✅ Direct backend connection successful!';
            console.log('Backend WebSocket connected');
            wsBackend.close();
            
            // Now test through Vite proxy
            setTimeout(() => {
                console.log('Testing connection through Vite proxy...');
                const wsProxy = new WebSocket(`ws://localhost:3000/ws/${roomId}`);
                
                wsProxy.onopen = () => {
                    document.getElementById('status').innerHTML += '<br>✅ Vite proxy connection successful!';
                    console.log('Proxy WebSocket connected');
                    wsProxy.close();
                };
                
                wsProxy.onerror = (error) => {
                    document.getElementById('status').innerHTML += '<br>❌ Vite proxy connection failed!';
                    console.error('Proxy WebSocket error:', error);
                };
                
                wsProxy.onclose = (event) => {
                    console.log('Proxy WebSocket closed:', event.code, event.reason);
                };
            }, 1000);
        };
        
        wsBackend.onerror = (error) => {
            document.getElementById('status').innerHTML += '<br>❌ Direct backend connection failed!';
            console.error('Backend WebSocket error:', error);
        };
        
        wsBackend.onclose = (event) => {
            console.log('Backend WebSocket closed:', event.code, event.reason);
        };
    </script>
</body>
</html>
