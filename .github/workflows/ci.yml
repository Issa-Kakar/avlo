name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install deps (lockfile)
        run: npm ci

      - name: Ensure env for prisma generate
        run: cp .env.example .env || true

      - name: Prisma generate (server)
        run: npm run db:generate

      - name: Install Chromium (no sudo)
        run: npx playwright install chromium

      - name: Build both workspaces
        run: npm run build

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
