<!DOCTYPE html>
<html>
<head>
    <title>Vanilla Yjs Test</title>
</head>
<body>
    <h1>Vanilla Yjs Test</h1>
    <div id="status">Not connected</div>
    <div id="sync">Sync: false</div>
    <div id="awareness">Clients: 0</div>
    <button onclick="testUpdate()">Send Test Update</button>
    <button onclick="openSecondClient()">Open Second Client</button>
    
    <script type="module">
        import * as Y from 'https://unpkg.com/yjs@13.6.27/+esm';
        import { WebsocketProvider } from 'https://unpkg.com/y-websocket@3.0.0/+esm';
        
        const roomId = 'test-room';
        const ydoc = new Y.Doc({ guid: roomId });
        const provider = new WebsocketProvider('ws://localhost:3001/ws', roomId, ydoc, { connect: true });
        
        provider.on('status', (e) => {
            console.log('[status]', e.status);
            document.getElementById('status').textContent = 'Status: ' + e.status;
        });
        
        provider.on('sync', (b) => {
            console.log('[sync]', b);
            document.getElementById('sync').textContent = 'Sync: ' + b;
        });
        
        provider.on('connection-close', (e) => {
            console.log('[connection-close]', e.code, e.reason);
        });
        
        provider.on('connection-error', (e) => {
            console.log('[connection-error]', e);
        });
        
        provider.awareness.on('update', () => {
            const states = provider.awareness.getStates();
            console.log('[awareness-update] clients:', states.size);
            document.getElementById('awareness').textContent = 'Clients: ' + states.size;
        });
        
        // Test update function
        window.testUpdate = () => {
            const ymap = ydoc.getMap('test');
            ymap.set('timestamp', Date.now());
            ymap.set('random', Math.random());
            console.log('Sent update:', ymap.toJSON());
        };
        
        // Open second client in new window
        window.openSecondClient = () => {
            window.open(window.location.href, '_blank');
        };
        
        // Subscribe to document changes
        ydoc.on('update', (update, origin) => {
            if (origin !== provider) {
                console.log('Received remote update');
            }
        });
        
        window.ydoc = ydoc;
        window.provider = provider;
    </script>
</body>
</html>
